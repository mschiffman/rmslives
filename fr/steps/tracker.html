<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Français — Daily Tracker</title>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-CHXHM9CZKM");
    </script>

    <!-- Favicons -->
    <link href="/img/favicon.png" rel="icon" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ["Playfair Display", "serif"],
              mono: ["DM Mono", "monospace"],
              sans: ["DM Sans", "sans-serif"],
            },
            colors: {
              cream: "#F9F6EF",
              ink: "#1A1A18",
              muted: "#6B6B60",
              border: "#E0DACE",
              shadow: "rgba(26,26,24,0.06)",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background: #f9f6ef;
      }

      .activity-card {
        transition:
          box-shadow 0.18s,
          transform 0.18s;
      }
      .activity-card:hover {
        box-shadow: 0 6px 24px rgba(26, 26, 24, 0.1);
        transform: translateY(-1px);
      }

      .check-circle {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1.5px solid #c8c4b8;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.18s;
        flex-shrink: 0;
        background: transparent;
      }
      .check-circle.done {
        border-color: transparent;
      }
      .check-circle svg {
        opacity: 0;
        transition: opacity 0.15s;
      }
      .check-circle.done svg {
        opacity: 1;
      }

      .progress-fill {
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .day-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1.5px solid #c8c4b8;
        display: inline-block;
        transition: all 0.2s;
      }
      .day-dot.done {
        border-color: transparent;
      }
      .day-dot.today {
        box-shadow:
          0 0 0 2px #f9f6ef,
          0 0 0 3.5px #8b7355;
      }

      .tab-btn {
        transition: all 0.15s;
      }
      .tab-btn.active {
        background: #1a1a18;
        color: #f9f6ef;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeSlide 0.35s ease both;
      }

      .streak-flame {
        animation: flicker 1.8s ease-in-out infinite;
      }
      @keyframes flicker {
        0%,
        100% {
          transform: scale(1) rotate(-2deg);
        }
        50% {
          transform: scale(1.08) rotate(2deg);
        }
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #c8c4b8;
        border-radius: 4px;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans text-ink">
    <!-- Header -->
    <header class="border-b border-border bg-cream sticky top-0 z-20">
      <div
        class="max-w-2xl mx-auto px-5 py-4 flex items-center justify-between"
      >
        <div>
          <p
            class="text-xs tracking-widest uppercase text-muted font-mono mb-0.5"
          >
            Mon Français
          </p>
          <h1 class="font-serif text-xl leading-tight">
            Daily Practice Tracker
          </h1>
        </div>
        <div class="text-right">
          <div class="flex items-center gap-1.5 justify-end mb-0.5">
            <span class="streak-flame text-lg">🔥</span>
            <span class="font-mono text-2xl font-medium" id="streak-count"
              >0</span
            >
          </div>
          <p class="text-xs text-muted">day streak</p>
        </div>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-5 py-7">
      <!-- Date + Week Row -->
      <div class="mb-7">
        <div class="flex items-end justify-between mb-3">
          <div>
            <p class="font-serif text-2xl" id="today-label">Today</p>
            <p class="text-sm text-muted font-mono" id="today-date"></p>
          </div>
          <div class="flex gap-1.5 items-center">
            <span class="text-xs text-muted mr-1 font-mono">W</span>
            <!-- 7 day dots -->
            <div id="week-dots" class="flex gap-1.5"></div>
          </div>
        </div>

        <!-- Overall progress bar -->
        <div class="bg-border rounded-full h-1.5 overflow-hidden">
          <div
            class="progress-fill bg-ink h-1.5 rounded-full"
            id="overall-bar"
            style="width: 0%"
          ></div>
        </div>
        <div class="flex justify-between mt-1.5">
          <span class="text-xs text-muted font-mono" id="progress-label"
            >0 / 7 done</span
          >
          <span class="text-xs text-muted font-mono" id="minutes-label"
            >0 min studied</span
          >
        </div>
      </div>

      <!-- Time Mode Tabs -->
      <div class="flex gap-2 mb-6 bg-border/50 rounded-xl p-1">
        <button
          class="tab-btn active flex-1 text-xs font-mono py-1.5 rounded-lg"
          onclick="setMode(60,this)"
        >
          60 min
        </button>
        <button
          class="tab-btn flex-1 text-xs font-mono py-1.5 rounded-lg"
          onclick="setMode(90,this)"
        >
          90 min
        </button>
        <button
          class="tab-btn flex-1 text-xs font-mono py-1.5 rounded-lg"
          onclick="setMode(120,this)"
        >
          120 min
        </button>
      </div>

      <!-- Activities -->
      <div id="activity-list" class="space-y-3 fade-in"></div>

      <!-- Notes -->
      <div class="mt-8">
        <p class="text-xs tracking-widest uppercase text-muted font-mono mb-2">
          Session notes
        </p>
        <textarea
          id="session-notes"
          placeholder="What felt hard today? Any new words or phrases that stuck?"
          class="w-full bg-white border border-border rounded-xl px-4 py-3 text-sm text-ink placeholder-muted/60 resize-none focus:outline-none focus:border-ink/30 transition-colors"
          rows="3"
          oninput="saveNotes()"
        ></textarea>
      </div>

      <!-- Weekly History -->
      <div class="mt-8">
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs tracking-widest uppercase text-muted font-mono">
            This week
          </p>
          <button
            onclick="clearToday()"
            class="text-xs text-muted hover:text-ink transition-colors font-mono underline underline-offset-2"
          >
            Reset today
          </button>
        </div>
        <div id="history-grid" class="grid grid-cols-7 gap-1.5"></div>
        <div class="flex justify-between mt-2">
          <span class="text-xs text-muted font-mono">Mon</span>
          <span class="text-xs text-muted font-mono">Sun</span>
        </div>
      </div>

      <!-- Tip -->
      <div class="mt-8 border-l-2 border-ink/20 pl-4 py-1">
        <p class="text-xs text-muted leading-relaxed" id="tip-text">
          Tip: Do shadowing and enunciation first while your ear is fresh, then
          Anki, then passive listening.
        </p>
      </div>
    </main>

    <script>
      // ── DATA ──────────────────────────────────────────────
      const ACTIVITIES = [
        {
          id: "shadowing",
          name: "Shadowing",
          detail: "Adrien Delgrande chunks",
          icon: "🎙️",
          color: "bg-orange-50 border-orange-200",
          accent: "#D0622A",
          pct: { 60: 25, 90: 22, 120: 21 },
        },
        {
          id: "enunciation",
          name: "Enunciation",
          detail: "Vowel & consonant files",
          icon: "🔊",
          color: "bg-amber-50 border-amber-200",
          accent: "#B87D1A",
          pct: { 60: 13, 90: 11, 120: 10 },
        },
        {
          id: "anki",
          name: "Anki vocabulary",
          detail: "Spaced repetition cards",
          icon: "🃏",
          color: "bg-blue-50 border-blue-200",
          accent: "#2563EB",
          pct: { 60: 17, 90: 17, 120: 15 },
        },
        {
          id: "grammar",
          name: "Grammar",
          detail: "Your website files",
          icon: "📝",
          color: "bg-violet-50 border-violet-200",
          accent: "#6D3FC9",
          pct: { 60: 13, 90: 11, 120: 10 },
        },
        {
          id: "reading",
          name: "Reading",
          detail: "Reading files at your level",
          icon: "📖",
          color: "bg-teal-50 border-teal-200",
          accent: "#0F766E",
          pct: { 60: 13, 90: 13, 120: 13 },
        },
        {
          id: "listening",
          name: "Listening",
          detail: "France24 — comprehensible input",
          icon: "📻",
          color: "bg-green-50 border-green-200",
          accent: "#2D7A3A",
          pct: { 60: 12, 90: 14, 120: 17 },
        },
        {
          id: "speaking",
          name: "Speaking",
          detail: "Langua AI practice",
          icon: "💬",
          color: "bg-pink-50 border-pink-200",
          accent: "#B83B6E",
          pct: { 60: 8, 90: 11, 120: 13 },
        },
      ];

      const TIPS = {
        60: "Tip: Do shadowing and enunciation first while your ear is fresh, then Anki, then passive listening.",
        90: "Tip: At 90 min, let your Langua sessions breathe — aim for a real back-and-forth conversation.",
        120: "Tip: With 2 hours, alternate reading and France24 day-by-day to avoid fatigue.",
      };

      // ── STATE ─────────────────────────────────────────────
      let mode = 60;
      let todayKey = getTodayKey();

      function getTodayKey() {
        return new Date().toISOString().slice(0, 10);
      }

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem("mf_state") || "{}");
        } catch {
          return {};
        }
      }

      function saveState(s) {
        localStorage.setItem("mf_state", JSON.stringify(s));
      }

      function getToday() {
        const s = loadState();
        return s[todayKey] || { done: {}, mode: 60, notes: "" };
      }

      function setDone(id, val) {
        const s = loadState();
        if (!s[todayKey]) s[todayKey] = { done: {}, mode, notes: "" };
        s[todayKey].done[id] = val;
        s[todayKey].mode = mode;
        saveState(s);
        render();
      }

      function saveNotes() {
        const s = loadState();
        if (!s[todayKey]) s[todayKey] = { done: {}, mode, notes: "" };
        s[todayKey].notes = document.getElementById("session-notes").value;
        saveState(s);
      }

      function setMode(m, btn) {
        mode = m;
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tip-text").textContent = TIPS[mode];
        render();
      }

      function clearToday() {
        const s = loadState();
        delete s[todayKey];
        saveState(s);
        document.getElementById("session-notes").value = "";
        render();
      }

      // ── RENDER ────────────────────────────────────────────
      function render() {
        const today = getToday();
        const total = mode;

        // Date
        const now = new Date();
        const opts = { weekday: "long", month: "long", day: "numeric" };
        document.getElementById("today-date").textContent =
          now.toLocaleDateString("en-GB", opts);

        // Activities
        const list = document.getElementById("activity-list");
        list.innerHTML = "";
        ACTIVITIES.forEach((a, i) => {
          const mins = Math.round((total * a.pct[mode]) / 100);
          const done = !!today.done[a.id];
          const card = document.createElement("div");
          card.className = `activity-card border ${a.color} rounded-2xl px-4 py-3.5 flex items-center gap-4 cursor-pointer select-none`;
          card.style.animationDelay = i * 0.04 + "s";
          card.innerHTML = `
          <div class="text-xl w-8 text-center">${a.icon}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2">
              <span class="font-medium text-sm ${done ? "line-through text-muted" : ""}">${a.name}</span>
              <span class="font-mono text-xs" style="color:${a.accent}">${mins} min</span>
            </div>
            <p class="text-xs text-muted truncate">${a.detail}</p>
          </div>
          <div class="check-circle ${done ? "done" : ""}" style="${done ? "background:" + a.accent : ""}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        `;
          card.onclick = () => setDone(a.id, !done);
          list.appendChild(card);
        });

        // Progress
        const doneCount = ACTIVITIES.filter((a) => today.done[a.id]).length;
        const pct = Math.round((doneCount / ACTIVITIES.length) * 100);
        const minsDone = ACTIVITIES.filter((a) => today.done[a.id]).reduce(
          (acc, a) => acc + Math.round((total * a.pct[mode]) / 100),
          0,
        );
        document.getElementById("overall-bar").style.width = pct + "%";
        document.getElementById("progress-label").textContent =
          `${doneCount} / ${ACTIVITIES.length} done`;
        document.getElementById("minutes-label").textContent =
          `${minsDone} min studied`;

        // Streak
        const s = loadState();
        let streak = 0;
        const d = new Date();
        for (let i = 0; i < 60; i++) {
          const key = d.toISOString().slice(0, 10);
          const day = s[key];
          const completed =
            day && Object.values(day.done || {}).filter(Boolean).length >= 4;
          if (completed) {
            streak++;
            d.setDate(d.getDate() - 1);
          } else if (i === 0) {
            d.setDate(d.getDate() - 1);
          } // skip today if not done yet
          else break;
        }
        document.getElementById("streak-count").textContent = streak;

        // Week dots
        renderWeekDots(s);

        // History grid
        renderHistory(s);

        // Notes
        document.getElementById("session-notes").value = today.notes || "";
      }

      function renderWeekDots(s) {
        const wrap = document.getElementById("week-dots");
        wrap.innerHTML = "";
        const now = new Date();
        // Mon–Sun of current week
        const day = now.getDay(); // 0=Sun
        const monday = new Date(now);
        monday.setDate(now.getDate() - ((day + 6) % 7));

        for (let i = 0; i < 7; i++) {
          const d = new Date(monday);
          d.setDate(monday.getDate() + i);
          const key = d.toISOString().slice(0, 10);
          const isToday = key === todayKey;
          const dayData = s[key];
          const done =
            dayData &&
            Object.values(dayData.done || {}).filter(Boolean).length >= 4;
          const future = d > now && !isToday;
          const dot = document.createElement("div");
          dot.className =
            "day-dot" + (done ? " done" : "") + (isToday ? " today" : "");
          if (done) dot.style.background = "#1A1A18";
          if (future) dot.style.opacity = "0.3";
          dot.title = d.toLocaleDateString("en-GB", {
            weekday: "short",
            day: "numeric",
          });
          wrap.appendChild(dot);
        }
      }

      function renderHistory(s) {
        const grid = document.getElementById("history-grid");
        grid.innerHTML = "";
        const now = new Date();
        const day = now.getDay();
        const monday = new Date(now);
        monday.setDate(now.getDate() - ((day + 6) % 7));

        for (let i = 0; i < 7; i++) {
          const d = new Date(monday);
          d.setDate(monday.getDate() + i);
          const key = d.toISOString().slice(0, 10);
          const isToday = key === todayKey;
          const dayData = s[key];
          const doneN = dayData
            ? Object.values(dayData.done || {}).filter(Boolean).length
            : 0;
          const total7 = ACTIVITIES.length;
          const pct = doneN / total7;
          const future = d > now && !isToday;

          const cell = document.createElement("div");
          cell.className =
            "rounded-lg h-10 flex flex-col items-center justify-center gap-0.5 border border-border transition-all";
          if (isToday) cell.style.borderColor = "#1A1A18";
          if (future) cell.style.opacity = "0.35";

          const fill = Math.round(pct * 100);
          const bg =
            pct === 1
              ? "#1A1A18"
              : pct > 0.5
                ? "#6B6B60"
                : pct > 0
                  ? "#C8C4B8"
                  : "transparent";
          cell.style.background = bg;

          const label = document.createElement("span");
          label.className = "font-mono text-xs leading-none";
          label.style.color = pct >= 0.5 ? "#F9F6EF" : "#6B6B60";
          label.textContent = ["M", "T", "W", "T", "F", "S", "S"][i];

          const count = document.createElement("span");
          count.className = "font-mono text-xs leading-none";
          count.style.color = pct >= 0.5 ? "#F9F6EF" : "#9B9B8E";
          count.textContent = doneN > 0 ? doneN : "";

          cell.appendChild(label);
          if (doneN > 0) cell.appendChild(count);
          grid.appendChild(cell);
        }
      }

      // Init
      render();
    </script>
  </body>
</html>
